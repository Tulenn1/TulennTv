appId: com.tulenntv.app
productName: TulennTv
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
  icon: public/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.png
  uninstallerIcon: public/icon.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Video
  icon: public/icon.png
  maintainer: Tulenn1 <toloplz12@gmail.com>
  artifactName: ${productName}-${version}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/icon.png
  artifactName: ${productName}-${version}.${ext}
